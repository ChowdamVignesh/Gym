<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="crossfit.css">
</head>
<body>
    <section class="crossfit-section">

    <h2>🔥 CrossFit Training</h2>
    <p>Select your fitness level and explore CrossFit workouts.</p>

    <div class="level-buttons">
        <button class="level-btn active" data-level="beginner">Beginner</button>
        <button class="level-btn" data-level="intermediate">Intermediate</button>
        <button class="level-btn" data-level="advanced">Advanced</button>
    </div>

    <div id="exerciseContainer" class="exercise-grid"></div>
</section>
<script src="crossfit.js"></script>
</body>
</html>
