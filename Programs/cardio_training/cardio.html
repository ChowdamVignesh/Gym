<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cardio Training</title>
    <link rel="stylesheet" href="cardio.css" />
  </head>
  <body>
    <section class="cardio-section">
      <h2>🏃 Cardio Training Exercises</h2>
      <p>Select your fitness level to view recommended cardio workouts.</p>

      <div class="level-buttons">
        <button class="level-btn active" data-level="beginner">Beginner</button>
        <button class="level-btn" data-level="intermediate">
          Intermediate
        </button>
        <button class="level-btn" data-level="advanced">Advanced</button>
      </div>

      <div id="exerciseContainer" class="exercise-grid"></div>
    </section>

    <script src="cardio.js"></script>
  </body>
</html>
